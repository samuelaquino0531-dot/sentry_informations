<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentry Informations - Plataforma de Monitoramento</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Seção de Autenticação Social -->
        <section class="auth-section">
            <h1>Bem-vindo à Sentry Informations</h1>
            
            <!-- Botão de Login Principal -->
            <button class="btn-sentry btn-neon-primary" onclick="handleLogin(this)">
                <span class="btn-text">ENTRAR NA PLATAFORMA</span>
            </button>

            <!-- Autenticação Social -->
            <div class="social-auth-container">
                <button class="btn-social" data-provider="Google" onclick="handleSocialLogin(this)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12.24 10.285V13.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.866-3.577-7.866-8s3.536-8 7.866-8c2.46 0 4.105 1.025 5.047 1.926l2.427-2.334C17.955 2.192 15.34 1 12.24 1 6.033 1 1 6.033 1 12.24s5.033 11.24 11.24 11.24c6.478 0 10.793-4.537 10.793-11 0-.746-.08-1.32-.176-1.895H12.24z"/></svg>
                </button>
                <button class="btn-social" data-provider="Discord" onclick="handleSocialLogin(this)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994.021-.041.001-.09-.041-.106a13.094 13.094 0 0 1-1.873-.894.077.077 0 0 1-.008-.128c.126-.093.252-.19.372-.287a.075.075 0 0 1 .077-.011c3.92 1.793 8.18 1.793 12.061 0a.073.073 0 0 1 .078.009c.12.099.246.195.373.289a.077.077 0 0 1-.006.127 12.298 12.298 0 0 1-1.873.894.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
                </button>
            </div>
        </section>

        <!-- Seção de Abas -->
        <section class="tabs-section">
            <div class="tab-container">
                <button class="tab-btn active" data-tab="posts" onclick="switchTab(this)">POSTS</button>
                <button class="tab-btn" data-tab="media" onclick="switchTab(this)">MÍDIA</button>
                <button class="tab-btn" data-tab="logs" onclick="switchTab(this)">LOGS</button>
            </div>
        </section>

        <!-- Seção de Emoções -->
        <section class="emotions-section">
            <h2>Como você está se sentindo?</h2>
            <div class="emotions-grid">
                <button class="emotion-card" data-emotion="calm" onclick="selectEmotion(this)">
                    <div class="emotion-icon">⚡</div>
                    <span class="emotion-title">Foco Humano</span>
                </button>
            </div>
        </section>
    </div>

    <!-- Script -->
    <script src="script.js"></script>
</body>
</html>
